apiVersion: apps/v1
kind: Deployment
metadata:
  name: energy-anomaly-api
  labels:
    app: energy-anomaly-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: energy-anomaly-api
  template:
    metadata:
      labels:
        app: energy-anomaly-api
    spec:
      containers:
        - name: api
          image: energy-anomaly-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: MODEL_PATH
              value: /app/models
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: energy-anomaly-service
spec:
  selector:
    app: energy-anomaly-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: energy-anomaly-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: energy-anomaly-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70